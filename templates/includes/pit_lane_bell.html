{% if is_logged_in %}
<div class="relative z-[200]" id="pit-lane-bell-wrap">
  <button
    type="button"
    id="pit-lane-bell-btn"
    class="relative z-[201] p-2 rounded-lg bg-gray-800 border border-gray-600 hover:bg-gray-700 text-lg leading-none cursor-pointer"
    title="Pit Lane — meddelanden"
    aria-label="Meddelanden"
    aria-expanded="false"
    aria-controls="pit-lane-dropdown"
    onclick="if(window.PitLaneBell){window.PitLaneBell.toggle(event);}"
  >
    🔔
    <span
      id="pit-lane-badge"
      class="hidden absolute -top-1 -right-1 min-w-[18px] h-[18px] px-1 rounded-full bg-red-500 text-white text-[10px] font-bold flex items-center justify-center pointer-events-none"
    >0</span>
  </button>
  <div
    id="pit-lane-dropdown"
    role="dialog"
    aria-label="Pit Lane meddelanden"
    class="pit-lane-dropdown-panel"
    style="display:none; position:fixed; z-index:99999;"
  >
    <div class="px-3 py-2 border-b border-gray-700 flex justify-between items-center bg-gray-900">
      <span class="text-sm font-bold text-cyan-400">Pit Lane</span>
      <a href="{{ url_for('pit_lane.pit_lane_page') }}" class="text-xs text-cyan-300 hover:underline">Öppna alla →</a>
    </div>
    <div id="pit-lane-dropdown-list" class="max-h-64 overflow-y-auto bg-gray-900">
      <p class="px-3 py-2 text-xs text-gray-500">Laddar…</p>
    </div>
  </div>
</div>
{% endif %}
