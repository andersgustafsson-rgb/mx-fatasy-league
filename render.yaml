services:
  - type: web
    name: mx-fatasy-league
    env: python
    buildCommand: pip install -r requirements.txt
    # Single worker halves peak RAM on 512MB plans (avoid two workers duplicating bulky requests).
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 1 --threads 8 --timeout 120 main:app
    envVars:
      - key: SECRET_KEY
        value: my-super-secret-key-for-mx-fantasy-league-2025
      - key: FLASK_ENV
        value: production
