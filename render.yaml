services:
  - type: web
    name: mx-fatasy-league
    env: python
    buildCommand: pip install -r requirements.txt
    # 512MB RAM: 2 workers = två kopior av appen i minnet -> OOM/502.
    # gunicorn.conf.py: 1 worker, 4 threads, worker recycle vid ~1500 req.
    startCommand: gunicorn -c gunicorn.conf.py main:app
    envVars:
      - key: SECRET_KEY
        value: my-super-secret-key-for-mx-fantasy-league-2025
      - key: FLASK_ENV
        value: production
